<section class="rw-hero d-flex justify-content-center align-items-center">
  <div class="rw-hero__bg"></div>
  <div class="rw-hero__overlay"></div>
    <div class="rw-hero__content__auth  " style="padding: 40px;" >
      <!-- Login Form -->
      <div id="loginForm"ng-show="!showResetForm" style="width: auto;min-width: 300px;">
        <h3 class="auth-title text-center">Login to Your Account</h3>

        <form name="loginForm" novalidate ng-submit="login()">
          <!-- Email -->
          <div class="mb-3 form-group">
            <input
              type="email"
              class="form-control rw-input"
              name="email"
              ng-model="user.email"
              placeholder="Email Address"
              required
              ng-class="{'is-invalid': loginForm.email.$touched && loginForm.email.$invalid}"
            />
            <div
              class="error-text"
              ng-show="loginForm.email.$touched && loginForm.email.$invalid"
            >
              <span ng-show="loginForm.email.$error.required"
                >Email is required</span
              >
              <span ng-show="loginForm.email.$error.email"
                >Invalid email format</span
              >
            </div>
          </div>

          <!-- Password -->
          <div class="mb-3 form-group">
            <input
              type="password"
              class="form-control rw-input"
              name="password"
              ng-model="user.password"
              placeholder="Password"
              required
              ng-minlength="8"
              ng-class="{'is-invalid': loginForm.password.$touched && loginForm.password.$invalid}"
            />
            <div
              class="error-text"
              ng-show="loginForm.password.$touched && loginForm.password.$error.required"
            >
              Password is required
            </div>
            <div
              class="error-text"
              ng-show="loginForm.password.$touched && loginForm.password.$error.minlength"
            >
              Password must be at least 8 characters
            </div>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            class="btn btn-primary w-100"
            style="background-color: var(--orange-color); border: none"
            ng-disabled="loginForm.$invalid || loading"
          >
            <span ng-if="!loading">Login</span>
            <span ng-if="loading">Logging in...</span>
          </button>

          <!-- Forgot Password Link -->
          <div class="text-center mt-2">
            <a
              href="javascript:void(0)"
              ng-click="showResetForm = true"
              style="
                font-size: 0.9em;
                color: var(--blue-color);
                cursor: pointer;
              "
              >Forgot my password?</a
            >
          </div>

          <!-- Supabase Error -->
          <div class="alert alert-danger mt-3 text-center" ng-if="loginError">
            {{ loginError }}
          </div>

          <div class="text-center mt-3">
            New here? <a href="#!/register">Sign up</a>
          </div>
        </form>
      </div>

      <!-- Reset Password Form -->
      <div id="resetForm" ng-show="showResetForm">
        <h3 class="auth-title text-center">Reset Your Password</h3>

        <form name="resetForm" novalidate ng-submit="resetPassword()">
          <!-- Email -->
          <div class="mb-3 form-group">
            <input
              type="email"
              class="form-control rw-input"
              name="reset-email"
              ng-model="resetData.email"
              placeholder="Enter your email address"
              required
              ng-class="{'is-invalid': resetForm['reset-email'].$touched && resetForm['reset-email'].$invalid}"
            />
            <div
              class="error-text"
              ng-show="resetForm['reset-email'].$touched && resetForm['reset-email'].$invalid"
            >
              <span ng-show="resetForm['reset-email'].$error.required"
                >Email is required</span
              >
              <span ng-show="resetForm['reset-email'].$error.email"
                >Invalid email format</span
              >
            </div>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="btn btn-primary w-100"
            style="background-color: var(--orange-color); border: none"
            ng-disabled="resetForm.$invalid || resetLoading"
          >
            <span ng-if="!resetLoading">Send Reset Link</span>
            <span ng-if="resetLoading">Sending...</span>
          </button>

          <!-- Success Message -->
          <div
            class="alert alert-success mt-3 text-center"
            ng-if="resetSuccess"
          >
            {{ resetSuccess }}
          </div>

          <!-- Error Message -->
          <div class="alert alert-danger mt-3 text-center" ng-if="resetError">
            {{ resetError }}
          </div>

          <!-- Back to Login Link -->
          <div class="text-center mt-3">
            <a
              href="javascript:void(0)"
              ng-click="showResetForm = false"
              style="
                font-size: 0.9em;
                color: var(--blue-color);
                cursor: pointer;
              "
              >Back to login</a
            >
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
